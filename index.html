
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1A1209">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Jamal Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --j-orange: #E8521A;
    --j-yellow: #F5C842;
    --j-dark: #1A1209;
    --j-card: #FBF7F0;
    --j-border: rgba(0,0,0,0.1);
    --color-background-primary: #fffaf2;
    --color-background-secondary: #f4eadc;
    --color-page-surround: #dfcfb9;
    --color-text-primary: #1A1209;
    --color-text-secondary: #6e6152;
    --color-border-secondary: rgba(26,18,9,0.18);
    --border-radius-md: 8px;
    --border-radius-lg: 10px;
  }
  html {
    min-height: 100%;
    background: var(--color-page-surround);
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }
  body {
    min-width: 0;
    min-height: 100%;
    overflow-x: hidden;
    font-family: 'DM Sans', sans-serif;
    background: var(--color-page-surround);
    color: var(--color-text-primary);
  }
  button, input, select {
    font: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  button { touch-action: manipulation; }
  #app {
    width: min(100%, 720px);
    min-height: 100vh;
    min-height: 100dvh;
    margin: 0 auto;
    padding: 0 0 calc(2rem + env(safe-area-inset-bottom));
    overflow-x: hidden;
    background: var(--color-background-primary);
  }
  .jt-header {
    background: var(--j-dark);
    color: white;
    padding: calc(1.25rem + env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) 1rem max(1rem, env(safe-area-inset-left));
    display: flex;
    align-items: center;
    gap: 1rem;
    position: relative;
    overflow: hidden;
  }
  .jt-header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: var(--j-orange);
    border-radius: 50%;
    opacity: 0.15;
  }
  .jt-header > div:not(.live-badge) { min-width: 0; }
  .jt-logo { font-family: 'Bebas Neue', sans-serif; font-size: clamp(28px, 8vw, 36px); letter-spacing: 2px; color: var(--j-yellow); line-height: 1; white-space: nowrap; }
  .jt-subtitle { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
  .radar-icon { font-size: 28px; color: var(--j-orange); animation: spin 4s linear infinite; display: inline-block; flex: 0 0 auto; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .live-badge {
    margin-left: auto;
    background: #E24B4A;
    color: white;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    padding: 3px 8px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 5px;
    flex: 0 0 auto;
  }
  .live-dot { width: 6px; height: 6px; background: white; border-radius: 50%; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .site-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 0;
    border-bottom: 1px solid var(--j-border);
    background: var(--color-background-primary);
  }
  .site-btn {
    padding: 10px 4px;
    min-width: 0;
    min-height: 58px;
    border: none;
    border-right: 0.5px solid var(--j-border);
    background: transparent;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
    position: relative;
  }
  .site-btn:last-child { border-right: none; }
  .site-btn:hover { background: var(--color-background-secondary); }
  .site-btn.active { background: #FFF3E0; }
  .site-name { font-family: 'Bebas Neue', sans-serif; font-size: clamp(14px, 4.2vw, 16px); letter-spacing: 1px; color: var(--color-text-primary); }
  .site-count { max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 10px; color: var(--color-text-secondary); }
  .jamal-here { position: absolute; top: 4px; right: 4px; width: 8px; height: 8px; background: #4CAF50; border-radius: 50%; box-shadow: 0 0 0 2px white; }

  .controls {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 8px;
    padding: 12px;
    background: var(--color-background-secondary);
    border-bottom: 0.5px solid var(--j-border);
  }
  .ctrl-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  select, input[type=text] {
    width: 100%;
    min-height: 44px;
    padding: 9px 10px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    background: var(--color-background-primary);
    color: var(--color-text-primary);
  }
  .btn-row { grid-column: 1 / -1; display: flex; gap: 8px; }
  .btn-spot {
    flex: 1;
    min-width: 0;
    min-height: 44px;
    padding: 9px;
    border: none;
    border-radius: var(--border-radius-md);
    background: var(--j-orange);
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-spot:hover { opacity: 0.9; transform: scale(1.01); }
  .btn-move {
    flex: 1;
    min-width: 0;
    min-height: 44px;
    padding: 9px;
    border: 0.5px solid var(--j-orange);
    border-radius: var(--border-radius-md);
    background: transparent;
    color: var(--j-orange);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-move:hover { background: rgba(232,82,26,0.07); }
  .btn-gone {
    flex: 1;
    min-height: 44px;
    padding: 9px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--color-text-secondary);
  }

  .tabs {
    display: flex;
    border-bottom: 0.5px solid var(--j-border);
    background: var(--color-background-primary);
  }
  .tab {
    flex: 1;
    min-width: 0;
    min-height: 44px;
    padding: 9px 6px;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--color-text-secondary);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab.active { color: var(--j-orange); border-bottom-color: var(--j-orange); }

  .feed { padding: 0; background: var(--color-background-primary); min-height: 260px; }
  .feed-item {
    display: flex;
    gap: 10px;
    padding: 10px 12px;
    border-bottom: 0.5px solid var(--j-border);
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .feed-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .feed-content { flex: 1; }
  .feed-content, .feed-main, .lb-name, #status-text { min-width: 0; overflow-wrap: anywhere; }
  .feed-main { font-size: 13px; color: var(--color-text-primary); line-height: 1.4; }
  .feed-main strong { color: var(--j-orange); font-weight: 600; }
  .feed-meta { font-size: 11px; color: var(--color-text-secondary); margin-top: 3px; }
  .tag {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-right: 4px;
  }
  .tag-spot { background: #E8F5E9; color: #2E7D32; }
  .tag-move { background: #FFF3E0; color: #E65100; }
  .tag-gone { background: #FAFAFA; color: #888; border: 0.5px solid #ddd; }
  .tag-urgent { background: #FFEBEE; color: #C62828; }
  .empty-state {
    padding: 2.5rem 1rem;
    text-align: center;
    color: var(--color-text-secondary);
    font-size: 13px;
  }
  .empty-big { font-size: 32px; margin-bottom: 8px; }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--color-background-secondary);
    border-bottom: 0.5px solid var(--j-border);
    font-size: 12px;
    color: var(--color-text-secondary);
  }
  .current-site {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    color: var(--color-text-primary);
    letter-spacing: 1px;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #9E9E9E; flex-shrink: 0; }
  .status-dot.green { background: #4CAF50; animation: pulse 1.5s infinite; }
  .status-dot.orange { background: var(--j-orange); animation: pulse 0.8s infinite; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
    padding: 12px;
  }
  .stat-card {
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md);
    padding: 10px 12px;
    text-align: center;
  }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--j-orange); letter-spacing: 1px; }
  .stat-lbl { font-size: 10px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }

  .toast {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom)); left: 50%;
    transform: translateX(-50%) translateY(calc(100% + 32px + env(safe-area-inset-bottom)));
    background: var(--j-dark);
    color: white;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    width: max-content;
    max-width: calc(100vw - 32px - env(safe-area-inset-left) - env(safe-area-inset-right));
    text-align: center;
    overflow-wrap: anywhere;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
    will-change: transform;
    z-index: 99;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .leaderboard { padding: 0; }
  .lb-row {
    display: flex;
    align-items: center;
    padding: 9px 12px;
    border-bottom: 0.5px solid var(--j-border);
    gap: 10px;
  }
  .lb-rank { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--color-text-secondary); width: 22px; text-align: center; }
  .lb-rank.gold { color: #F5C842; }
  .lb-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); flex: 1; }
  .lb-count { font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: var(--j-orange); }

  .nickname-wrap { grid-column: 1 / -1; }

  @media (max-width: 430px) {
    #app {
      width: 100%;
    }
    .jt-header {
      gap: 0.7rem;
      border-radius: 0;
    }
    .jt-subtitle {
      font-size: 10px;
      letter-spacing: 0.7px;
      white-space: nowrap;
    }
    .live-badge {
      font-size: 9px;
      letter-spacing: 1px;
      padding: 3px 6px;
    }
    .controls {
      grid-template-columns: 1fr;
      padding: 12px max(12px, env(safe-area-inset-right)) 12px max(12px, env(safe-area-inset-left));
    }
    .btn-row {
      flex-direction: column;
    }
    .btn-spot,
    .btn-move,
    .btn-gone {
      width: 100%;
      font-size: 18px;
    }
    .status-bar {
      align-items: center;
      flex-wrap: wrap;
      padding-inline: max(12px, env(safe-area-inset-left)) max(12px, env(safe-area-inset-right));
    }
    #last-seen {
      flex-basis: 100%;
      margin-left: 15px !important;
    }
    .stats-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 360px) {
    .jt-logo {
      font-size: 26px;
      letter-spacing: 1.5px;
    }
    .radar-icon {
      font-size: 24px;
    }
    .site-btn {
      padding-inline: 2px;
    }
    .site-count {
      font-size: 9px;
    }
    .tab {
      font-size: 11px;
    }
  }
</style>
</head>
<body>

<div id="app">
  <div class="jt-header">
    <i class="ti ti-radar radar-icon" aria-hidden="true"></i>
    <div>
      <div class="jt-logo">Jamal Tracker</div>
      <div class="jt-subtitle">Where in the world is Jamal?</div>
    </div>
    <div class="live-badge"><span class="live-dot"></span>LIVE</div>
  </div>

  <div id="status-bar" class="status-bar">
    <span class="status-dot" id="sdot"></span>
    <span id="status-text">Loading Jamal data...</span>
    <span style="margin-left:auto; font-size:11px;" id="last-seen"></span>
  </div>

  <div class="site-grid" id="site-grid"></div>

  <div class="controls">
    <div class="nickname-wrap">
      <div class="ctrl-label">Your callsign</div>
      <input type="text" id="nickname" placeholder="e.g. Night Owl, BigSpy, Anonymous Coward" maxlength="24" />
    </div>
    <div>
      <div class="ctrl-label">Spotted at</div>
      <select id="sel-site">
        <option value="">-- pick a site --</option>
          <option>ATL68</option>
          <option>ATL72</option>
          <option>ATL73</option>
          <option>ATL74</option>
          <option>ATL75</option>
          <option>ATL76</option>
          <option>ATL77</option>
          <option>ATL78</option>
          <option>ATL85</option>
          <option>ATL88</option>
      </select>
    </div>
    <div>
      <div class="ctrl-label">Heading to (move only)</div>
      <select id="sel-dest">
        <option value="">-- destination --</option>
          <option>Unknown</option>
          <option>ATL68</option>
          <option>ATL72</option>
          <option>ATL73</option>
          <option>ATL74</option>
          <option>ATL75</option>
          <option>ATL76</option>
          <option>ATL77</option>
          <option>ATL78</option>
          <option>ATL85</option>
          <option>ATL88</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn-spot" onclick="reportSpot()"><i class="ti ti-eye" aria-hidden="true"></i> I SEE JAMAL</button>
      <button class="btn-move" onclick="reportMove()"><i class="ti ti-run" aria-hidden="true"></i> HE'S MOVING</button>
    </div>
    <div class="btn-row" style="gap:8px">
      <button class="btn-gone" onclick="reportGone()"><i class="ti ti-ghost" aria-hidden="true"></i> He left / can't find him</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('feed',this)"><i class="ti ti-activity" aria-hidden="true"></i> Feed</button>
    <button class="tab" onclick="switchTab('stats',this)"><i class="ti ti-chart-bar" aria-hidden="true"></i> Stats</button>
    <button class="tab" onclick="switchTab('leaderboard',this)"><i class="ti ti-trophy" aria-hidden="true"></i> Spotters</button>
  </div>

  <div id="tab-feed" class="feed"></div>
  <div id="tab-stats" style="display:none"></div>
  <div id="tab-leaderboard" style="display:none" class="leaderboard"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SITES = ['ATL68','ATL72','ATL73','ATL74','ATL75','ATL76','ATL77','ATL78','ATL85','ATL88'];
const FUNNY = [
  "👀 All units be advised.",
  "🚨 Someone squeal on Jamal again.",
  "📡 Signal acquired.",
  "🕵️ The eagle has landed.",
  "☕ Probably getting coffee. Stay alert.",
  "🔭 Confirmed visual.",
  "📻 This is not a drill.",
  "🎯 Target located.",
  "🦅 The bird has flown.",
  "🤫 He doesn't know we're watching.",
  "👋 Wave and pretend you didn't see anything.",
  "🏃 He's on the move, people!",
];
const MOVE_QUIPS = [
  "Buckle up — Jamal is airborne.",
  "The migration has begun.",
  "He's loose. God help us.",
  "Intercept at your own risk.",
  "Track lost. Recalibrating...",
];

let state = { current: null, lastSeen: null, events: [], siteCounts: {}, spotter: {} };
const HAS_SHARED_API = location.protocol !== 'file:';

async function load() {
  try {
    if (HAS_SHARED_API) {
      const r = await fetch('/api/state', { cache: 'no-store' });
      if (!r.ok) throw new Error('Shared state unavailable');
      const loaded = await r.json();
      state = { ...state, ...loaded };
    } else if (window.storage) {
      const r = await window.storage.get('jt-state', true);
      if (r && r.value) {
        const loaded = JSON.parse(r.value);
        state = { ...state, ...loaded };
      }
    }
  } catch(e) {
    showToast('Shared Jamal data is offline right now.');
  }
  renderAll();
}

async function save() {
  try {
    if (HAS_SHARED_API) {
      const r = await fetch('/api/state', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state)
      });
      if (!r.ok) throw new Error('Shared state save failed');
    } else if (window.storage) {
      await window.storage.set('jt-state', JSON.stringify(state), true);
    }
  } catch(e) {
    showToast('Could not save shared Jamal data.');
  }
}

function getName() {
  const n = document.getElementById('nickname').value.trim();
  return n || 'Anonymous';
}

function timeAgo(ts) {
  const diff = (Date.now() - ts) / 1000;
  if (diff < 60) return `${Math.round(diff)}s ago`;
  if (diff < 3600) return `${Math.round(diff/60)}m ago`;
  if (diff < 86400) return `${Math.round(diff/3600)}h ago`;
  return `${Math.round(diff/86400)}d ago`;
}

function formatTimestamp(ts) {
  return new Intl.DateTimeFormat('en-US', {
    hour: 'numeric',
    minute: '2-digit',
    hour12: true
  }).format(new Date(ts));
}

function pushEvent(evt) {
  state.events.unshift(evt);
  if (state.events.length > 80) state.events = state.events.slice(0, 80);
}

function reportSpot() {
  const site = document.getElementById('sel-site').value;
  if (!site) { showToast('Pick a site first, detective.'); return; }
  const name = getName();
  const quip = FUNNY[Math.floor(Math.random()*FUNNY.length)];
  state.current = site;
  state.lastSeen = Date.now();
  state.siteCounts[site] = (state.siteCounts[site] || 0) + 1;
  state.spotter[name] = (state.spotter[name] || 0) + 1;
  pushEvent({ type: 'spot', site, name, ts: Date.now(), quip });
  save(); renderAll();
  showToast(`📍 Jamal spotted at ${site}!`);
}

function reportMove() {
  const site = document.getElementById('sel-site').value;
  const dest = document.getElementById('sel-dest').value || 'Unknown';
  if (!site) { showToast('From where, though?'); return; }
  const name = getName();
  const quip = MOVE_QUIPS[Math.floor(Math.random()*MOVE_QUIPS.length)];
  state.current = null;
  state.lastSeen = Date.now();
  state.spotter[name] = (state.spotter[name] || 0) + 1;
  pushEvent({ type: 'move', from: site, to: dest, name, ts: Date.now(), quip });
  save(); renderAll();
  showToast(`🏃 Jamal is on the move from ${site}!`);
}

function reportGone() {
  const name = getName();
  if (state.current) {
    pushEvent({ type: 'gone', site: state.current, name, ts: Date.now(), quip: 'Gone. Poof. Like he was never there.' });
    state.current = null;
    state.lastSeen = Date.now();
    save(); renderAll();
    showToast('🌫️ Jamal has vanished.');
  } else {
    showToast('We already lost him. Classic Jamal.');
  }
}

function renderSites() {
  const grid = document.getElementById('site-grid');
  grid.innerHTML = SITES.map(s => `
    <button class="site-btn${state.current===s?' active':''}" onclick="quickSpot('${s}')">
      ${state.current===s?'<span class="jamal-here"></span>':''}
      <span class="site-name">${s}</span>
      <span class="site-count">${state.siteCounts[s]||0} spots</span>
    </button>
  `).join('');
}

function quickSpot(site) {
  document.getElementById('sel-site').value = site;
}

function renderStatus() {
  const dot = document.getElementById('sdot');
  const txt = document.getElementById('status-text');
  const ls = document.getElementById('last-seen');
  if (state.current) {
    dot.className = 'status-dot green';
    txt.innerHTML = `Jamal is at <span class="current-site">${state.current}</span> — stay calm, act natural`;
  } else {
    const moving = state.events[0] && state.events[0].type === 'move';
    dot.className = moving ? 'status-dot orange' : 'status-dot';
    txt.textContent = moving ? `In transit to ${state.events[0].to} — intercept if brave` : 'Location unknown — pray for intel';
  }
  ls.textContent = state.lastSeen ? `Last activity ${timeAgo(state.lastSeen)}` : '';
}

function renderFeed() {
  const feed = document.getElementById('tab-feed');
  if (!state.events.length) {
    feed.innerHTML = '<div class="empty-state"><div class="empty-big">🕵️</div>No sightings yet.<br>Be the first brave soul to file a report.</div>';
    return;
  }
  feed.innerHTML = state.events.slice(0,25).map(e => {
    let tag, main;
    if (e.type === 'spot') {
      tag = `<span class="tag tag-spot">SPOTTED</span>`;
      main = `<strong>${e.site}</strong> — ${e.quip}`;
    } else if (e.type === 'move') {
      tag = `<span class="tag tag-move">MOVING</span>`;
      main = `<strong>${e.from}</strong> → <strong>${e.to}</strong> — ${e.quip}`;
    } else {
      tag = `<span class="tag tag-gone">GONE</span>`;
      main = `Last seen at <strong>${e.site}</strong> — ${e.quip}`;
    }
    const initials = (e.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const colors = ['#E8521A','#185FA5','#3B6D11','#993556','#534AB7'];
    const bg = colors[(e.name||'?').charCodeAt(0)%colors.length];
    return `<div class="feed-item">
      <div class="feed-avatar" style="background:${bg}20;color:${bg};font-size:13px;font-weight:600;">${initials}</div>
      <div class="feed-content">
        <div class="feed-main">${tag} ${main}</div>
        <div class="feed-meta">${e.name} · ${timeAgo(e.ts)} · ${formatTimestamp(e.ts)}</div>
      </div>
    </div>`;
  }).join('');
}

function renderStats() {
  const el = document.getElementById('tab-stats');
  const total = state.events.length;
  const spots = state.events.filter(e=>e.type==='spot').length;
  const moves = state.events.filter(e=>e.type==='move').length;
  const topSite = Object.entries(state.siteCounts).sort((a,b)=>b[1]-a[1])[0];
  const spotterCount = Object.keys(state.spotter).length;

  const bars = SITES.map(s => {
    const c = state.siteCounts[s] || 0;
    const max = Math.max(...SITES.map(x=>state.siteCounts[x]||0), 1);
    const pct = Math.round((c/max)*100);
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <span style="font-family:Bebas Neue,sans-serif;font-size:14px;width:44px;color:var(--color-text-secondary);">${s}</span>
      <div style="flex:1;background:var(--color-background-secondary);border-radius:4px;height:18px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:var(--j-orange);border-radius:4px;transition:width 0.4s;"></div>
      </div>
      <span style="font-size:12px;color:var(--color-text-secondary);width:20px;text-align:right;">${c}</span>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">Total Reports</div></div>
      <div class="stat-card"><div class="stat-num">${spots}</div><div class="stat-lbl">Sightings</div></div>
      <div class="stat-card"><div class="stat-num">${moves}</div><div class="stat-lbl">Migrations</div></div>
      <div class="stat-card" style="grid-column:1/-1"><div class="stat-num">${topSite?topSite[0]:'—'}</div><div class="stat-lbl">Jamal's Favourite Haunt (${topSite?topSite[1]:0} times)</div></div>
      <div class="stat-card" style="grid-column:1/-1"><div class="stat-num">${spotterCount}</div><div class="stat-lbl">Informants Active</div></div>
    </div>
    <div style="padding:0 12px 12px;">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--color-text-secondary);margin-bottom:10px;">Sightings by Site</div>
      ${bars}
    </div>`;
}

function renderLeaderboard() {
  const el = document.getElementById('tab-leaderboard');
  const sorted = Object.entries(state.spotter).sort((a,b)=>b[1]-a[1]).slice(0,10);
  if (!sorted.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-big">🏆</div>No informants yet.<br>Be the hero this office deserves.</div>';
    return;
  }
  const medals = ['1','2','3'];
  el.innerHTML = sorted.map(([name, count], i) => `
    <div class="lb-row">
      <span class="lb-rank${i===0?' gold':''}">${medals[i]||i+1}</span>
      <div class="feed-avatar" style="width:28px;height:28px;font-size:11px;font-weight:600;background:#E8521A22;color:#E8521A;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${name.slice(0,2).toUpperCase()}</div>
      <span class="lb-name">${name}</span>
      <span class="lb-count">${count} 👁</span>
    </div>
  `).join('');
}

function renderAll() {
  renderSites();
  renderStatus();
  const ft = document.getElementById('tab-feed');
  const st = document.getElementById('tab-stats');
  const lb = document.getElementById('tab-leaderboard');
  if (ft.style.display !== 'none') renderFeed();
  if (st.style.display !== 'none') renderStats();
  if (lb.style.display !== 'none') renderLeaderboard();
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ['feed','stats','leaderboard'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===id ? '' : 'none';
  });
  if (id==='stats') renderStats();
  if (id==='leaderboard') renderLeaderboard();
  if (id==='feed') renderFeed();
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

setInterval(() => { renderStatus(); renderFeed(); }, 15000);
load();
</script>
</body>
</html>
